<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Major Project — AI Agents</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --border: #1e1e2e;
    --accent: #7c6af7;
    --accent2: #f7c66a;
    --accent3: #6af7c0;
    --text: #e8e8f0;
    --muted: #6b6b80;
    --danger: #f76a6a;
    --radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Animated background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(124,106,247,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(124,106,247,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  header {
    position: relative;
    z-index: 10;
    padding: 20px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(12px);
    background: rgba(10, 10, 15, 0.8);
  }

  .logo { display: flex; align-items: center; gap: 12px; }
  .logo-icon {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, var(--accent), var(--accent3));
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center; font-size: 18px;
  }
  .logo-text { font-size: 18px; font-weight: 800; letter-spacing: -0.5px; }
  .logo-text span { color: var(--accent); }

  .status-pill {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 14px; background: rgba(106, 247, 192, 0.08);
    border: 1px solid rgba(106, 247, 192, 0.2);
    border-radius: 100px; font-size: 13px; color: var(--accent3); font-family: 'DM Mono', monospace;
  }
  .status-dot { width: 7px; height: 7px; background: var(--accent3); border-radius: 50%; animation: pulse 2s infinite; }

  @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(0.8); } }

  .container { position: relative; z-index: 10; display: flex; flex: 1; height: calc(100vh - 77px); }

  .sidebar {
    width: 280px; flex-shrink: 0; border-right: 1px solid var(--border);
    padding: 24px 20px; display: flex; flex-direction: column; gap: 8px; overflow-y: auto;
  }

  .sidebar-label { font-size: 11px; font-weight: 600; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; padding: 0 8px; margin-bottom: 4px; }

  .agent-btn {
    display: flex; align-items: center; gap: 12px; padding: 14px 16px;
    border-radius: var(--radius); border: 1px solid transparent; background: transparent;
    color: var(--muted); font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 600;
    cursor: pointer; transition: all 0.2s; width: 100%;
  }
  .agent-btn:hover { background: var(--surface); color: var(--text); border-color: var(--border); }
  .agent-btn.active { background: rgba(124,106,247,0.12); color: var(--text); border-color: rgba(124,106,247,0.3); }

  .agent-icon { width: 34px; height: 34px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; background: var(--border); }
  .agent-btn.active .agent-icon { background: rgba(124,106,247,0.2); }

  .chat-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: rgba(10, 10, 15, 0.4); }
  .chat-header { padding: 16px 32px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .chat-title { display: flex; align-items: center; gap: 10px; font-size: 16px; font-weight: 700; }
  .model-badge { padding: 4px 10px; background: var(--border); border-radius: 6px; font-size: 11px; font-family: 'DM Mono', monospace; color: var(--muted); }

  .messages { flex: 1; overflow-y: auto; padding: 32px; display: flex; flex-direction: column; gap: 24px; }
  .msg { display: flex; gap: 14px; animation: fadeUp 0.3s ease; max-width: 90%; }
  .msg.user { align-self: flex-end; flex-direction: row-reverse; }

  .msg-avatar { width: 34px; height: 34px; border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .msg.assistant .msg-avatar { background: linear-gradient(135deg, var(--accent), var(--accent3)); }
  .msg.user .msg-avatar { background: linear-gradient(135deg, var(--accent2), #f7976a); }

  .msg-bubble { padding: 14px 18px; border-radius: var(--radius); font-size: 14px; line-height: 1.6; border: 1px solid var(--border); }
  .msg.assistant .msg-bubble { background: var(--surface); color: var(--text); }
  .msg.user .msg-bubble { background: rgba(124,106,247,0.15); border-color: rgba(124,106,247,0.25); }

  /* Markdown Table Styling */
  .msg-bubble table { border-collapse: collapse; width: 100%; margin: 12px 0; border: 1px solid var(--border); }
  .msg-bubble th { background: rgba(124,106,247,0.1); padding: 10px; text-align: left; border: 1px solid var(--border); font-weight: 700; color: var(--accent3); }
  .msg-bubble td { padding: 8px 10px; border: 1px solid var(--border); }
  .msg-bubble tr:nth-child(even) { background: rgba(255,255,255,0.02); }
  .msg-bubble h1, .msg-bubble h2, .msg-bubble h3 { margin: 10px 0; color: var(--accent); }
  .msg-bubble ul, .msg-bubble ol { padding-left: 20px; margin: 10px 0; }

  .input-area { padding: 20px 32px; border-top: 1px solid var(--border); }
  .input-box { display: flex; gap: 12px; background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 12px 16px; align-items: flex-end; }
  #userInput { flex: 1; background: none; border: none; outline: none; color: var(--text); font-family: 'Syne', sans-serif; font-size: 14px; resize: none; max-height: 150px; }
  .send-btn { background: var(--accent); border: none; border-radius: 8px; width: 36px; height: 36px; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  /* Suggestions */
  .welcome { text-align: center; margin: auto; max-width: 500px; }
  .suggestions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
  .suggestion-card { background: var(--surface); border: 1px solid var(--border); padding: 12px; border-radius: 10px; cursor: pointer; color: var(--text); font-size: 13px; text-align: left; transition: 0.2s; }
  .suggestion-card:hover { border-color: var(--accent); background: rgba(124,106,247,0.05); }

  .typing-indicator { display: flex; gap: 4px; padding: 10px; }
  .dot { width: 6px; height: 6px; background: var(--muted); border-radius: 50%; animation: bounce 1.4s infinite ease-in-out; }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1.0); } }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">🤖</div>
    <div class="logo-text">Major<span>AI</span></div>
  </div>
  <div class="status-pill">
    <div class="status-dot"></div>
    <span id="statusText">checking...</span>
  </div>
</header>

<div class="container">
  <aside class="sidebar">
    <div class="sidebar-label">Agents</div>
    <button class="agent-btn active" onclick="selectAgent('stock_agent', this)">
      <div class="agent-icon">📈</div>
      <div class="agent-info">
        <div class="agent-name">Stock Agent</div>
        <div class="agent-role">Finance & Market Data</div>
      </div>
    </button>
    <button class="agent-btn" onclick="selectAgent('web_agent', this)">
      <div class="agent-icon">🌐</div>
      <div class="agent-info">
        <div class="agent-name">Web Agent</div>
        <div class="agent-role">Search & News</div>
      </div>
    </button>
  </aside>

  <div class="chat-area">
    <div class="chat-header">
      <div class="chat-title"><span id="activeIcon">📈</span> <span id="activeName">Stock Agent</span></div>
      <div class="model-badge">llama-3.3-70b-versatile</div>
    </div>

    <div class="messages" id="messages">
      <div class="welcome" id="welcomeScreen">
        <h2>How can I help you today?</h2>
        <p style="color: var(--muted); margin-top: 8px;">Select an agent and start a conversation.</p>
        <div class="suggestions">
          <div class="suggestion-card" onclick="sendPrompt('Samsung stock price (SSNLF)')">📊 Samsung price & fundamentals</div>
          <div class="suggestion-card" onclick="sendPrompt('NVIDIA vs AMD comparison')">💹 NVIDIA vs AMD comparison</div>
          <div class="suggestion-card" onclick="sendPrompt('Latest stock market news')">📰 Latest market news</div>
          <div class="suggestion-card" onclick="sendPrompt('Apple analyst recommendations')">🚗 Apple recommendations</div>
        </div>
      </div>
    </div>

    <div class="input-area">
      <div class="input-box">
        <textarea id="userInput" placeholder="Ask your agent anything..." rows="1" onkeydown="checkKey(event)"></textarea>
        <button class="send-btn" onclick="sendMessage()">➤</button>
      </div>
    </div>
  </div>
</div>

<script>
  const BASE_URL = 'https://major-project-jims.onrender.com';
  let currentAgent = 'stock_agent';
  let isLoading = false;

  // Configure Markdown Parser
  marked.setOptions({ gfm: true, breaks: true });

  async function checkStatus() {
    try {
      const res = await fetch(`${BASE_URL}/v1/playground/agent/get`);
      document.getElementById('statusText').textContent = res.ok ? 'online' : 'limited';
    } catch { document.getElementById('statusText').textContent = 'offline'; }
  }

  function selectAgent(id, btn) {
    currentAgent = id;
    document.querySelectorAll('.agent-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('activeIcon').textContent = id === 'stock_agent' ? '📈' : '🌐';
    document.getElementById('activeName').textContent = id === 'stock_agent' ? 'Stock Agent' : 'Web Agent';
  }

  function sendPrompt(text) {
    document.getElementById('userInput').value = text;
    sendMessage();
  }

  async function sendMessage() {
    const input = document.getElementById('userInput');
    const text = input.value.trim();
    if (!text || isLoading) return;

    document.getElementById('welcomeScreen')?.remove();
    addMessage('user', text);
    input.value = '';

    isLoading = true;
    const typingId = showTyping();

    try {
      const formData = new FormData();
      formData.append('message', text);
      formData.append('agent_id', currentAgent);
      formData.append('stream', 'false');
      formData.append('session_id', 'sid-' + Math.random().toString(36).substr(2, 9));

      const res = await fetch(`${BASE_URL}/v1/playground/agent/run`, {
        method: 'POST',
        body: formData
      });

      const data = await res.json();
      removeTyping(typingId);

      // EXTRACT CONTENT: Handle nested JSON if necessary
      let reply = data.content || data.message || "No response received.";
      addMessage('assistant', reply);

    } catch (err) {
      removeTyping(typingId);
      addMessage('assistant', "⚠️ **Error connecting to server.** Please check if your backend is running.");
    }
    isLoading = false;
  }

  function addMessage(role, content) {
    const container = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = `msg ${role}`;

    const avatar = role === 'user' ? '👤' : (currentAgent === 'stock_agent' ? '📈' : '🌐');

    // Parse Markdown for tables and formatting
    const htmlContent = marked.parse(content);

    div.innerHTML = `
      <div class="msg-avatar">${avatar}</div>
      <div class="msg-bubble">${htmlContent}</div>
    `;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
  }

  function showTyping() {
    const id = 'typing-' + Date.now();
    const container = document.getElementById('messages');
    const div = document.createElement('div');
    div.id = id;
    div.className = 'msg assistant';
    div.innerHTML = `
      <div class="msg-avatar">${currentAgent === 'stock_agent' ? '📈' : '🌐'}</div>
      <div class="msg-bubble"><div class="typing-indicator"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>
    `;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
    return id;
  }

  function removeTyping(id) { document.getElementById(id)?.remove(); }

  function checkKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } }

  checkStatus();
</script>
</body>
</html>
